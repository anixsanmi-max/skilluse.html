<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skilluse Institution - Portal Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* Smooth, moving gradient background */
            background: linear-gradient(-45deg, #1a1c29, #232a45, #1b3a4b, #27153a);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
        }

        /* Background animation keyframes */
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Subtle floating decorative shapes for added depth */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 198, 251, 0.2), rgba(0, 91, 234, 0.2));
            backdrop-filter: blur(10px);
            animation: float 8s ease-in-out infinite;
            z-index: 1;
        }

        .circle-1 { width: 150px; height: 150px; top: 15%; left: 15%; animation-delay: 0s; }
        .circle-2 { width: 250px; height: 250px; bottom: 10%; right: 15%; animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Glassmorphism Login Container */
        .login-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            text-align: center;
        }

        /* Header Styling */
        .logo-area h1 {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .motto {
            color: #00d2ff;
            font-size: 0.9rem;
            font-style: italic;
            font-weight: 400;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        /* Form Controls */
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #cbd5e1;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            outline: none;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #00d2ff;
            box-shadow: 0 0 12px rgba(0, 210, 255, 0.2);
        }

        /* Utilities */
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #cbd5e1;
            cursor: pointer;
        }

        .remember-me input {
            margin-right: 6px;
            accent-color: #00d2ff;
        }

        .forgot-pass {
            color: #00d2ff;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-pass:hover {
            text-decoration: underline;
            color: #00b4db;
        }

        /* Submit Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.3);
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 180, 219, 0.5);
            background: linear-gradient(135deg, #00c6fb, #005bea);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Footer links */
        .footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .footer a {
            color: #cbd5e1;
            text-decoration: none;
        }

        .footer a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Animated background shapes -->
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <!-- Main Portal Box -->
    <div class="login-container">
        <div class="logo-area">
            <h1>Skilluse Institution</h1>
            <p class="motto">"Empowering Skills. Illuminating Minds."</p>
        </div>

        <form action="#" method="POST" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="username">Portal ID / Email</label>
                <input type="text" id="username" placeholder="Enter your ID or email" required autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Sign In to Portal</button>
        </form>

        <div class="footer">
            <p>© 2026 Skilluse Institution. All rights reserved.</p>
            <p style="margin-top: 5px;"><a href="#">Privacy Policy</a> | <a href="#">Need Help?</a></p>
        </div>
    </div>

</body>
</html>
